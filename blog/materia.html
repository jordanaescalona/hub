<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materia — Blog Tecnicatura</title>
    <link rel="stylesheet" href="css/blog.css">
</head>

<body>

    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Jordana Escalona</a>
        <ul class="navbar-links">
            <li><a href="index.html">← Volver al blog</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1 id="subjectName">Cargando...</h1>
        <p id="subjectDescription"></p>
    </section>

    <div class="container">
        <div class="posts-list" id="postsList">
            <div class="loading-blog">Cargando entradas...</div>
        </div>
    </div>

    <footer>
        <p>© 2026 Jordana Escalona — Blog Tecnicatura en Ciencias de Datos e IA</p>
    </footer>

    <script src="js/materia.js"></script>
    <!-- Lightbox -->
    <div id="lightboxOverlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:300; align-items:center; justify-content:center; cursor:zoom-out; overflow:auto;">
        <button onclick="closeLightbox()"
            style="position:fixed; top:1rem; right:1rem; background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:1.2rem; width:36px; height:36px; border-radius:50%; cursor:pointer; z-index:301;">✕</button>
        <div
            style="display:flex; gap:0.5rem; position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); z-index:301;">
            <button onclick="zoomIn()"
                style="background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:1.2rem; width:36px; height:36px; border-radius:50%; cursor:pointer;">+</button>
            <button onclick="zoomOut()"
                style="background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:1.2rem; width:36px; height:36px; border-radius:50%; cursor:pointer;">−</button>
            <button onclick="resetZoom()"
                style="background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:0.75rem; width:36px; height:36px; border-radius:50%; cursor:pointer;">↺</button>
        </div>
        <img id="lightboxImg" src="" alt=""
            style="max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; transition: transform 0.2s; cursor:zoom-in;">
    </div>
</body>

</html>
