<head>

    <link rel="stylesheet" href="css/blog.css">
</head>

<body>

    <nav class="navbar">

        <button onclick="closeLightbox()"
            style="position:absolute; top:1rem; right:1rem; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.2rem; width:36px; height:36px; border-radius:50%; cursor:pointer;">✕</button>

    </div>
