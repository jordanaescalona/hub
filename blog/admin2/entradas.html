<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Entradas</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h2>Admin Blog</h2>
        <p>Tecnicatura CS Datos e IA</p>
    </div>
    <nav class="sidebar-nav">
        <a href="materias.html"><span class="nav-icon">📚</span> Materias</a>
        <a href="unidades.html"><span class="nav-icon">📂</span> Unidades</a>
        <a href="entradas.html" class="active"><span class="nav-icon">📝</span> Entradas</a>
        <a href="informacion.html"><span class="nav-icon">ℹ️</span> Información</a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <h1>Entradas</h1>
        <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
    <div class="content">

        <div class="card">
            <div class="card-header">
                <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
                    <h2>Entradas</h2>
                    <select id="filterMateria" onchange="onMateriaFilter()" style="border:1px solid #e2e8f0; border-radius:6px; padding:0.4rem 0.8rem; font-size:0.85rem;">
                        <option value="">Todas las materias</option>
                    </select>
                    <select id="filterUnidad" onchange="loadEntradas()" style="border:1px solid #e2e8f0; border-radius:6px; padding:0.4rem 0.8rem; font-size:0.85rem;">
                        <option value="">Todas las unidades</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Nueva entrada</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Materia</th>
                        <th>Unidad</th>
                        <th>Tipo</th>
                        <th>Orden</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="entradasTable">
                    <tr><td colspan="6" class="empty-state">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal entrada -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal modal-large">
        <h3 id="modalTitle">Nueva entrada</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label>Materia *</label>
                <select id="fieldMateria" onchange="onMateriaChange()"></select>
            </div>
            <div class="form-group">
                <label>Unidad</label>
                <select id="fieldUnidad">
                    <option value="">Sin unidad</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Título *</label>
            <input type="text" id="fieldTitle" placeholder="Título de la entrada">
        </div>
        <div class="form-group">
            <label>Contenido *</label>
            <div style="margin-bottom:0.5rem; display:flex; gap:0.5rem;">
                <button type="button" class="btn btn-secondary btn-sm" onclick="pdfHandler()">📄 Insertar PDF</button>
            </div>
            <div id="editorContainer"></div>
        </div>
        <div class="form-group">
            <label>URL de imagen destacada (opcional)</label>
            <input type="url" id="fieldImageUrl" placeholder="https://...">
        </div>
        <div style="display:flex; gap:2rem; align-items:center;">
            <div class="form-group checkbox-group" style="margin:0">
                <input type="checkbox" id="fieldIsPro">
                <label for="fieldIsPro" style="margin:0">Contenido PRO</label>
            </div>
            <div class="form-group" style="margin:0; display:flex; align-items:center; gap:0.5rem;">
                <label style="margin:0">Orden</label>
                <input type="number" id="fieldOrder" value="0" min="0" style="width:80px;">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="save()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal eliminar -->
<div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width:380px">
        <h3>Eliminar entrada</h3>
        <p style="color:#64748b; font-size:0.9rem">¿Eliminar <strong id="deleteName"></strong>?</p>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDelete()">Cancelar</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="js/entradas.js"></script>
</body>
</html>
