<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portfolio — Login</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h1>Panel de administración</h1>
        <p>Portfolio — Jordana Escalona</p>
        <div class="alert error" id="alert"></div>
        <div class="form-group">
            <label>Token de administrador</label>
            <input type="password" id="adminToken" placeholder="••••••••" autofocus>
        </div>
        <button class="btn btn-primary" style="width:100%" id="loginBtn">Ingresar</button>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    if (getToken()) window.location.href = 'proyectos.html';

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const token = document.getElementById('adminToken').value.trim();
        if (!token) { showAlert('alert', 'Ingresá el token'); return; }

        try {
            const res = await fetch(`${API}/api/projects`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) { showAlert('alert', 'Token incorrecto'); return; }
            saveToken(token);
            window.location.href = 'proyectos.html';
        } catch (err) {
            showAlert('alert', 'Error al conectar con el servidor');
        }
    });

    document.getElementById('adminToken').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>

</body>
</html>
