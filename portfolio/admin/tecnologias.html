<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portfolio — Tecnologías</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://kit.fontawesome.com/acda845b13.js" crossorigin="anonymous"></script>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h2>Admin Portfolio</h2>
        <p>Jordana Escalona</p>
    </div>
    <nav class="sidebar-nav">
        <a href="proyectos.html"><span class="nav-icon">💻</span> Proyectos</a>
        <a href="certificaciones.html"><span class="nav-icon">🏆</span> Certificaciones</a>
        <a href="mensajes.html"><span class="nav-icon">✉️</span> Mensajes</a>
        <a href="tecnologias.html" class="active"><span class="nav-icon">⚙️</span> Tecnologías</a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <h1>Tecnologías</h1>
        <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-header">
                <h2>Listado de tecnologías</h2>
                <button class="btn btn-primary" onclick="openModal()">+ Nueva tecnología</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Ícono</th>
                        <th>Nombre</th>
                        <th>Orden</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tecnologiasTable">
                    <tr><td colspan="4" class="empty-state">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal tecnología -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Nueva tecnología</h3>
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="fieldName" placeholder="Ej: Python">
        </div>
        <div class="form-group">
            <label>Ícono (emoji o texto)</label>
            <input type="text" id="fieldIcon" placeholder="🐍">
        </div>
        <div class="form-group">
            <label>Orden</label>
            <input type="number" id="fieldOrder" value="0" min="0">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="save()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal eliminar -->
<div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width:380px">
        <h3>Eliminar tecnología</h3>
        <p style="color:#64748b; font-size:0.9rem">¿Eliminar <strong id="deleteName"></strong>?</p>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDelete()">Cancelar</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/tecnologias.js"></script>
</body>
</html>
